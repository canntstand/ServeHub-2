x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:stable
    container_name: nginx
    logging: *default-logging
    ports:
      - "10.8.0.2:80:80"
      - "127.0.0.1:80:80"
      - "10.8.0.2:8080:8080"
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    environment:
      - SERVER_NAME=${SERVER_NAME}
    volumes:
      - ./configs/nginx/templates/nginx.local.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      navidrome:
        condition: service_started
      grafana:
        condition: service_started
      audiobookshelf:
        condition: service_started
      nextcloud:
        condition: service_healthy
      vaultwarden:
        condition: service_started
      portainer:
        condition: service_started
      amnezia-client:
        condition: service_healthy
      borg-ui:
        condition: service_started
      gitea:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    restart: unless-stopped
    logging: *default-logging
    expose:
      - 9113
    command: --nginx.scrape-uri=http://nginx:8080/stub_status
    depends_on:
      nginx:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  navidrome:
    container_name: navidrome
    image: deluan/navidrome:0.62.0
    restart: unless-stopped
    logging: *default-logging
    expose:
      - 4533
    environment:
      ND_SCANINTERVAL: "1m"
      ND_LOGLEVEL: "info"
      ND_BASEURL: "/navidrome"
    volumes:
      - ./apps-data/navidrome/data:/data
      - /home/${LOCAL_USER}/PersonalData/Music:/music:ro
    deploy:
      resources:
        limits:
          memory: 1G

  audiobookshelf:
    container_name: audiobookshelf
    image: advplyr/audiobookshelf:2.35.1
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 80
    environment:
      - AUDIOBOOKSHELF_PORT=80
      - AUDIOBOOKSHELF_BASE_PATH=/audiobookshelf
    volumes:
      - ./apps-data/audiobookshelf/config:/config
      - ./apps-data/audiobookshelf/metadata:/metadata
      - /home/${LOCAL_USER}/PersonalData/Audiobooks:/audiobooks
      - /home/${LOCAL_USER}/PersonalData/Podcasts:/podcasts
      - /home/${LOCAL_USER}/PersonalData/Books:/books
    deploy:
      resources:
        limits:
          memory: 1G

  nextcloud-db:
    image: postgres:18
    container_name: nextcloud-db
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - ./apps-data/postgres/nextcloud:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NEXTCLOUD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
  
  nextcloud-redis:
    image: redis:8.8.0
    container_name: nextcloud-redis
    restart: unless-stopped
    command: redis-server --requirepass ${NEXTCLOUD_REDIS_PASS}
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G

  nextcloud:
    image: nextcloud:34.0.0-apache
    container_name: nextcloud
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 80
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    environment:
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=${POSTGRES_DB_NEXTCLOUD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - OVERWRITEWEBROOT=/nextcloud
      - OVERWRITEPROTOCOL=https
      - REDIS_HOST=nextcloud-redis
      - REDIS_PORT=6379
      - REDIS_HOST_PASSWORD=${NEXTCLOUD_REDIS_PASS}
      - HTACCESS_OVERRIDE_CURRENT=1
      - NEXTCLOUD_TRUSTED_DOMAINS=${SERVER_NAME}
      - TRUSTED_PROXIES=172.16.0.0/12 10.8.0.0/24
      - NC_maintenance_window_start=2
      - NC_default_phone_region=RU
      - NC_filelocking.enabled=true
      - 'NC_memcache.local=\OC\Memcache\APCu'
      - 'NC_memcache.locking=\OC\Memcache\Redis'
    volumes:
      - ./apps-data/nextcloud/html:/var/www/html
      - /home/${LOCAL_USER}/PersonalData/NextcloudData:/var/www/html/data
    deploy:
      resources:
        limits:
          memory: 3G
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /var/www/html/config/config.php && php occ status",
        ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  nextcloud-cron:
    image: nextcloud:34.0.0-apache
    container_name: nextcloud-cron
    restart: unless-stopped
    volumes:
      - ./apps-data/nextcloud/html:/var/www/html
      - /home/${LOCAL_USER}/PersonalData/NextcloudData:/var/www/html/data
    entrypoint: /cron.sh
    logging: *default-logging
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  vaultwarden-db:
    image: postgres:18
    container_name: vaultwarden-db
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - ./apps-data/postgres/vaultwarden:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${POSTGRES_DB_VAULTWARDEN}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  vaultwarden:
    image: vaultwarden/server:1.36.0
    container_name: vaultwarden
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 80
    depends_on:
      vaultwarden-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vaultwarden-db:5432/${POSTGRES_DB_VAULTWARDEN}
      - DOMAIN=https://${SERVER_NAME}/vaultwarden
      - SIGNUPS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
      - ADMIN_TOKEN=${SECRET_VAULTWARDEN_PASSWORD}
    volumes:
      - ./apps-data/vaultwarden/data:/data
    deploy:
      resources:
        limits:
          memory: 1G

  prometheus:
    image: prom/prometheus:v3
    container_name: prometheus
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 9090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./apps-data/prometheus/data:/prometheus
    depends_on:
      node-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
      alertmanager:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G

  grafana:
    image: grafana/grafana:13.0-slim
    container_name: grafana
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 3000
    environment:
      - GF_SERVER_ROOT_URL=https://${SERVER_NAME}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./apps-data/grafana/data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G

  node-exporter:
    image: prom/node-exporter:v1.11.1
    container_name: node-exporter
    logging: *default-logging
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/udev:/run/udev:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/rootfs/(sys|proc|dev|host|etc|var/lib/docker)($$|/)"
    deploy:
      resources:
        limits:
          memory: 1G

  cadvisor:
    image: ghcr.io/google/cadvisor:0.57
    container_name: cadvisor
    logging: *default-logging
    restart: unless-stopped
    privileged: true
    expose:
      - 8080
    command:
      - "--allow_dynamic_housekeeping=true"
      - "--housekeeping_interval=10s"
      - "--disable_metrics=disk,referenced_memory"
      - "--raw_cgroup_prefix_whitelist=/system.slice,/user.slice"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev:/dev:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /sys/fs/cgroup:/cgroup:ro
    deploy:
      resources:
        limits:
          memory: 1G

  portainer:
    image: portainer/portainer-ce:2.39.3
    container_name: portainer
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./apps-data/portainer/data:/data
    command: --base-url=/portainer/
    deploy:
      resources:
        limits:
          memory: 1G

  alertmanager:
    image: prom/alertmanager:v0.32.2
    container_name: alertmanager
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - ./configs/monitoring:/etc/alertmanager
      - ./apps-data/alertmanager:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    expose:
      - 9093
    deploy:
      resources:
        limits:
          memory: 1G

  amnezia-client:
    build:
      context: .
      dockerfile: Dockerfile.amnezia
    container_name: amnezia-client
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    privileged: true
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./apps-data/amnezia:/config
      - /lib/modules:/lib/modules:ro
    logging: *default-logging
    network_mode: "host"
    healthcheck:
      test: ["CMD-SHELL", "awg show | grep interface || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  borg-ui:
    image: ainullcode/borg-ui:2.2.5
    container_name: borg-ui
    restart: unless-stopped
    logging: *default-logging
    privileged: true
    expose:
      - 8081
    environment:
      - INITIAL_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - BORG_CACHE_DIR=/home/borg/.cache/borg
      - LOCAL_MOUNT_POINTS=/mnt/backup_storage
      - BASE_PATH=/borg-ui
      - REDIS_HOST=disabled
    volumes:
      - ./apps-data/borg-ui:/data
      - ./apps-data/borg-ui-cache:/home/borg/.cache/borg:rw
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - /mnt/backup_storage:/mnt/backup_storage:rw
    deploy:
      resources:
        limits:
          memory: 1G

  loki:
    image: grafana/loki:3.7
    container_name: loki
    restart: unless-stopped
    ports:
      - "10.8.0.2:3100:3100"
    volumes:
      - ./configs/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - ./apps-data/loki:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    logging: *default-logging
    depends_on:
      amnezia-client: 
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    volumes:
      - ./configs/alloy/local.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
  
  gitea:
    image: gitea/gitea:1.26
    container_name: gitea
    logging: *default-logging
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=https://${SERVER_NAME}/gitea/
      - GITEA__server__DISABLE_SSH=true
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      - GITEA__security__INSTALL_LOCK=true
    volumes:
      - ./apps-data/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    expose:
      - 3000
    restart: unless-stopped
