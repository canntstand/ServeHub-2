x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  synapse:
    container_name: synapse
    image: matrixdotorg/synapse:latest
    restart: unless-stopped
    logging: *default-logging
    expose:
      - 8008
    volumes:
      - ./apps-data/synapse:/data
    depends_on:
      synapse_db:
        condition: service_healthy
    environment:
      - SYNAPSE_REPORT_STATS=no
    deploy:
      resources:
        limits:
          memory: 1.5G
    healthcheck:
      test:
        ["CMD", "curl", "-f", "http://localhost:8008/_matrix/client/versions"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  synapse_db:
    container_name: synapse_db
    logging: *default-logging
    image: postgres:18
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB_SYNAPSE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - synapse_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:stable
    container_name: nginx_proxy
    logging: *default-logging
    ports:
      - "80:80"
      - "8080:8080"
    restart: unless-stopped
    environment:
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
    volumes:
      - ./configs/nginx/templates/nginx.local.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./configs/nginx/www:/usr/share/nginx/html:ro
    depends_on:
      synapse:
        condition: service_healthy
      navidrome:
        condition: service_started
      audiobookshelf:
        condition: service_started
      nextcloud:
        condition: service_healthy
      vaultwarden:
        condition: service_started
      portainer:
        condition: service_started
      amnezia-client:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx_exporter
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "9113:9113"
    command: --nginx.scrape-uri=http://nginx_proxy:8080/stub_status
    depends_on:
      nginx:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    restart: unless-stopped
    logging: *default-logging
    expose:
      - 4533
    environment:
      ND_SCANINTERVAL: "1m"
      ND_LOGLEVEL: "info"
      ND_BASEURL: "/navidrome"
    volumes:
      - ./apps-data/navidrome/data:/data
      - /home/${HOME_USER_NAME}/Music:/music:ro
    deploy:
      resources:
        limits:
          memory: 512M

  audiobookshelf:
    container_name: audiobookshelf
    image: advplyr/audiobookshelf:latest
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 80
    environment:
      - AUDIOBOOKSHELF_PORT=80
      - AUDIOBOOKSHELF_BASE_PATH=/audiobookshelf
    volumes:
      - ./apps-data/audiobookshelf/config:/config
      - ./apps-data/audiobookshelf/metadata:/metadata
      - /home/${HOME_USER_NAME}/Audiobooks:/audiobooks
      - /home/${HOME_USER_NAME}/Podcasts:/podcasts
      - /home/${HOME_USER_NAME}/Books:/books
    deploy:
      resources:
        limits:
          memory: 512M

  nextcloud_db:
    image: postgres:18
    container_name: nextcloud_db
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - nextcloud_db_data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NEXTCLOUD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  nextcloud:
    image: nextcloud:stable
    container_name: nextcloud
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 80
    depends_on:
      nextcloud_db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=nextcloud_db
      - POSTGRES_DB=${POSTGRES_DB_NEXTCLOUD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - OVERWRITEWEBROOT=/nextcloud
      - OVERWRITEPROTOCOL=https
      - HTACCESS_OVERRIDE_CURRENT=1
      - NEXTCLOUD_TRUSTED_DOMAINS=${SYNAPSE_SERVER_NAME}
      - TRUSTED_PROXIES=172.16.0.0/12 10.8.0.0/24
      - NC_maintenance_window_start=2
      - NC_default_phone_region=RU
      - NC_filelocking.enabled=true
      - 'NC_memcache.local=\OC\Memcache\APCu'
    volumes:
      - ./apps-data/nextcloud/html:/var/www/html
      - /home/${HOME_USER_NAME}/NextcloudData:/var/www/html/data
    deploy:
      resources:
        limits:
          memory: 1.5G
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "test -f /var/www/html/config/config.php && php occ status",
        ]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  nextcloud_cron:
    image: nextcloud:stable
    container_name: nextcloud_cron
    restart: unless-stopped
    volumes:
      - ./apps-data/nextcloud/html:/var/www/html
      - /home/${HOME_USER_NAME}/NextcloudData:/var/www/html/data
    entrypoint: /cron.sh
    logging: *default-logging
    depends_on:
      nextcloud_db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  vaultwarden_db:
    image: postgres:18
    container_name: vaultwarden_db
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - vaultwarden_db_data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${POSTGRES_DB_VAULTWARDEN}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    expose:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 80
    depends_on:
      vaultwarden_db:
        condition: service_healthy
    env_file:
    - .env.vaultwarden-hash
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@vaultwarden_db:5432/${POSTGRES_DB_VAULTWARDEN}
      - DOMAIN=https://${SYNAPSE_SERVER_NAME}/vaultwarden
      - SIGNUPS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
    volumes:
      - ./apps-data/vaultwarden/data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus_init:
    image: alpine:latest
    container_name: prometheus_init
    restart: "no"
    logging: *default-logging
    user: "root"
    volumes:
      - ./apps-data/prometheus:/mnt/prometheus
      - ./apps-data/grafana:/mnt/grafana
    command: >
      sh -c "
      mkdir -p /mnt/prometheus/data && 
      chown -R 65534:65534 /mnt/prometheus/data &&
      mkdir -p /mnt/grafana/data &&
      chown -R 472:472 /mnt/grafana/data
      "
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 9090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./apps-data/prometheus/data:/prometheus
    depends_on:
      prometheus_init:
        condition: service_completed_successfully
      node_exporter:
        condition: service_started
      cadvisor:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 3000
    environment:
      - GF_SERVER_ROOT_URL=https://${SYNAPSE_SERVER_NAME}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_USER=${ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./apps-data/grafana/data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus_init:
        condition: service_completed_successfully
      prometheus:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    logging: *default-logging
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /run/udev:/run/udev:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/rootfs/(sys|proc|dev|host|etc|var/lib/docker)($$|/)"
    deploy:
      resources:
        limits:
          memory: 512M

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.54.1
    container_name: cadvisor
    logging: *default-logging
    restart: unless-stopped
    privileged: true
    ports:
      - "8090:8090"
    command:
      - "--allow_dynamic_housekeeping=true"
      - "--housekeeping_interval=10s"
      - "--disable_metrics=disk,referenced_memory"
      - "--raw_cgroup_prefix_whitelist=/system.slice,/user.slice"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev:/dev:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /sys/fs/cgroup:/cgroup:ro
    deploy:
      resources:
        limits:
          memory: 512M

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    logging: *default-logging
    restart: unless-stopped
    expose:
      - 9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./apps-data/portainer/data:/data
    secrets:
      - portainer_key
    environment:
      - PORTAINER_ENCRYPTION_KEY_FILE=/run/secrets/portainer_key
    command: --base-url=/portainer/
    deploy:
      resources:
        limits:
          memory: 512M

  monitoring_configure:
    image: alpine:3.20
    container_name: monitoring_configure
    logging: *default-logging
    volumes:
      - ./configs/monitoring:/mnt/monitoring
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MATRIX_BOT_USERNAME=${MATRIX_BOT_USERNAME}
      - MATRIX_BOT_PASSWORD=${MATRIX_BOT_PASSWORD}
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
      - ADMIN_USER=${ADMIN_USER}
      - MONITORING_SECRET=${MONITORING_SECRET}
    command: >
      sh -c "
        apk add --no-cache curl jq gettext docker-cli;

        echo '1. Регистрация пользователя бота в Matrix...';
        docker exec synapse register_new_matrix_user -c /data/homeserver.yaml -u \"$$MATRIX_BOT_USERNAME\" -p \"$$MATRIX_BOT_PASSWORD\" --no-admin || echo 'Пользователь уже существует, пропускаем';

        echo '2. Получение Access Token для бота...';
        BOT_TOKEN=$$(curl -s -X POST -H 'Content-Type: application/json' -d \"{\\\"type\\\":\\\"m.login.password\\\",\\\"identifier\\\":{\\\"type\\\":\\\"m.id.user\\\",\\\"user\\\":\\\"$$MATRIX_BOT_USERNAME\\\"},\\\"password\\\":\\\"$$MATRIX_BOT_PASSWORD\\\"}\" http://synapse:8008/_matrix/client/v3/login | jq -r '.access_token');

        if [ \"$$BOT_TOKEN\" = \"null\" ] || [ -z \"$$BOT_TOKEN\" ]; then
          echo 'ОШИБКА: Не удалось получить токен бота!'; exit 1;
        fi;

        echo '3. Создание комнаты и получение её внутреннего ID (!)...';
        CREATE_ROOM_RESP=$$(curl -s -X POST -H \"Authorization: Bearer $$BOT_TOKEN\" -H 'Content-Type: application/json' -d \"{\\\"visibility\\\":\\\"private\\\",\\\"room_alias_name\\\":\\\"server-alerts\\\",\\\"name\\\":\\\"Server Alerts\\\",\\\"preset\\\":\\\"private_chat\\\",\\\"invite\\\":[\\\"@$$ADMIN_USER:$$SYNAPSE_SERVER_NAME\\\"]}\" http://synapse:8008/_matrix/client/v3/createRoom);
        
        ERRCODE=$$(echo \"$$CREATE_ROOM_RESP\" | jq -r '.errcode');
        
        if [ \"$$ERRCODE\" = \"M_ROOM_IN_USE\" ]; then
          echo '-> Комната уже существует, получаем её ID...';
          ROOM_ID=$$(curl -s http://synapse:8008/_matrix/client/v3/directory/room/%23server-alerts%3A${SYNAPSE_SERVER_NAME} | jq -r '.room_id');
        else
          ROOM_ID=$$(echo \"$$CREATE_ROOM_RESP\" | jq -r '.room_id');
          echo '-> Комната успешно создана, инвайт отправлен!';
        fi;

        echo '4. Передача динамических данных для matrix_alertmanager...';
        echo \"export MATRIX_TOKEN=$$BOT_TOKEN\" > /mnt/monitoring/bot_env.sh;
        echo \"export MATRIX_INTERNAL_ROOM_ID=$$ROOM_ID\" >> /mnt/monitoring/bot_env.sh;

        echo '5. Генерация alertmanager.yml на основе шаблона...';
        envsubst < /mnt/monitoring/alertmanager.template.yml > /mnt/monitoring/alertmanager.yml;

        echo 'Мониторинг успешно сконфигурирован!';
      "
    depends_on:
      synapse:
        condition: service_healthy
      prometheus_init:
        condition: service_completed_successfully

  matrix_alertmanager:
    image: jaywink/matrix-alertmanager:latest
    container_name: matrix_alertmanager
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - ./configs/monitoring:/mnt/monitoring:ro
    environment:
      - MATRIX_HOMESERVER_URL=http://synapse:8008
      - MATRIX_USER=@${MATRIX_BOT_USERNAME}:${SYNAPSE_SERVER_NAME}
      - APP_ALERTMANAGER_SECRET=${MONITORING_SECRET}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Ожидание файла окружения от конфигуратора...";
        until [ -f /mnt/monitoring/bot_env.sh ]; do sleep 1; done;

        echo "Чтение токена и ID комнаты...";
        . /mnt/monitoring/bot_env.sh

        echo "Настройка маршрутизации (Ресивер -> Внутренний ID)..."
        export MATRIX_ROOMS="matrix-room-alerts/$${MATRIX_INTERNAL_ROOM_ID}"

        echo "Запуск matrix-alertmanager...";
        exec node src/app.js
    depends_on:
      synapse:
        condition: service_healthy
      monitoring_configure:
        condition: service_completed_successfully

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - ./configs/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    expose:
      - 9093
    depends_on:
      prometheus:
        condition: service_started
      monitoring_configure:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 512M

  amnezia-client:
    build:
      context: .
      dockerfile: Dockerfile.amnezia
    container_name: amnezia-client
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    privileged: true
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./configs/amnezia:/config
      - /lib/modules:/lib/modules:ro
    logging: *default-logging
    network_mode: "host"
    healthcheck:
      test: ["CMD-SHELL", "awg show | grep interface || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      monitoring_configure:
        condition: service_completed_successfully

volumes:
  synapse_db_data:
  nextcloud_db_data:
  vaultwarden_db_data:

secrets:
  portainer_key:
    file: ./secrets/portainer_key