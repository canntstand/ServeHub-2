user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

stream {
    map $remote_addr $is_family_vpn {
        ~^10\.[0-9]+\.          1; 
        127.0.0.1               1;
        default                 0;
    }

    server {
        listen 80;
        if ($is_family_vpn = 0) { return ""; }
        proxy_pass 127.0.0.1:8080;
        proxy_protocol on;
    }

    server {
        listen 443;
        if ($is_family_vpn = 0) { return ""; }
        proxy_pass 127.0.0.1:8443;
        proxy_protocol on;
    }
}