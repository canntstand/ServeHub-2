x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.3.2
    container_name: uptime-kuma
    logging: *default-logging
    restart: unless-stopped
    environment:
      - UPTIME_KUMA_BASE_URL=/uptime-kuma/
      - UPTIME_KUMA_DB_TYPE=sqlite
    volumes:
      - ./uptime-kuma-data:/app/data
    ports:
      - "127.0.0.1:51822:3001"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:stable
    container_name: nginx_vps
    logging: *default-logging
    restart: unless-stopped
    network_mode: "host"
    environment:
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
    volumes:
      - ./nginx/templates/nginx.remote.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/www:/usr/share/nginx/html:ro
      - ./certs:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      wg-easy:
        condition: service_healthy
      uptime_kuma:
        condition: service_healthy
  
  certbot:
    build:
      context: .
      dockerfile: Dockerfile.certbot
    container_name: certbot
    logging: *default-logging
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certs-data:/var/lib/letsencrypt
      - ./certbot-dns-webnames:/opt/certbot-dns-webnames
    environment:
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
    command: >
      certonly
      --manual
      --manual-auth-hook /opt/certbot-dns-webnames/authenticator.sh
      --manual-cleanup-hook /opt/certbot-dns-webnames/cleanup.sh
      --preferred-challenges dns-01
      --agree-tos
      --no-eff-email
      --non-interactive
      -d "${SYNAPSE_SERVER_NAME}"
      -d "*.${SYNAPSE_SERVER_NAME}"
      --email "${EMAIL}"
    deploy:
      resources:
        limits:
          memory: 512M

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15.3
    container_name: wg-easy
    environment:
      - LANG=en
      - WG_HOST=${SERVER_IP}
      - PORT=51821
      - WG_PORT=51820
      - WEBROOT_BIND_ADDRESS=127.0.0.1
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - PROMETHEUS_ENABLED=true
      - WG_BASE_URL=/wg-easy
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_PERSISTENT_KEEPALIVE=25
      - WG_ALLOWED_IPS=0.0.0.0/0
      - EXPERIMENTAL_AWG=true
      - OVERRIDE_AUTO_AWG=awg
      - INSECURE=true
      - WG_DEVICE=eth0
      - INIT_ENABLED=true
      - INIT_USERNAME=${ADMIN_USER}
      - INIT_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./config:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    network_mode: "host"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    healthcheck:
      test: ["CMD", "awg", "show", "awg0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  kuma_init:
    build:
      context: .
      dockerfile: Dockerfile.kuma_init
    container_name: kuma_init
    restart: "no"  
    network_mode: "host"
    environment:
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      uptime-kuma:
        condition: service_healthy
