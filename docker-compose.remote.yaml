x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  amnezia-wg:
    image: amneziavpn/amnezia-wg:latest
    container_name: amnezia-wg
    restart: always
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - /lib/modules:/lib/modules:ro
      - ./amnezia-data/client_server.conf:/etc/wireguard/wg0.conf:ro
    command: wg-quick up wg0

  uptime-kuma:
    image: louislam/uptime-kuma:2.3.2
    container_name: uptime-kuma
    logging: *default-logging
    restart: always
    volumes:
      - ./uptime-kuma-data:/app/data
    networks:
      - vps_network
    deploy:
      resources:
        limits:
          memory: 512M

  nginx:
    image: nginx:stable
    container_name: nginx_vps
    logging: *default-logging
    restart: always
    ports:
      - "443:443"
      - "80:80"
      - "3001:3001"
      - "2222:2222"
    environment:
      - SYNAPSE_SERVER_NAME=${SYNAPSE_SERVER_NAME}
    networks:
      - vps_network
    volumes:
      - ./nginx/nginx.remote.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  vps_network:
    name: vps_network