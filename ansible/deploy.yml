- name: "[Bootstrap] Проверка: доступен ли root?"
  hosts: vps, local
  gather_facts: no
  vars_files:
    - vars/secrets.yml
  tags: bootstrap

  vars:
    ansible_password: "{{ user_pass }}"
    ansible_ssh_pass: "{{ user_pass }}"

  pre_tasks:
    - name: "[SSH] Проверка: доступен ли root?"
      ansible.builtin.ping:
      ignore_errors: yes
      ignore_unreachable: yes
      vars:
        ansible_user: root
      register: root_auth_check

    - name: "[SSH] Логика: настройка подключения под root"
      set_fact:
        ansible_user: root
        ansible_become: no
      when: root_auth_check.ping is defined

    - name: "[SSH] Логика: настройка sudo для обычного пользователя"
      set_fact:
        ansible_become: yes
        ansible_become_method: sudo
        ansible_become_password: "{{ user_pass }}"
      when: root_auth_check.ping is not defined

  tasks:
    - name: "[Python] Установка Python3 (необходим для работы Ansible)"
      raw: |
        if [ "$USER" != "root" ]; then SUDO="sudo"; else SUDO=""; fi
        
        if command -v apt-get >/dev/null; then
            $SUDO apt-get update && $SUDO env DEBIAN_FRONTEND=noninteractive NEEDRESTART_MODE=l apt-get install -y python3
        elif command -v pacman >/dev/null; then
            $SUDO pacman -Sy --noconfirm --overwrite "*" archlinux-keyring && $SUDO pacman -Syu --noconfirm --overwrite "*" python3
        else
            echo "Unsupported distribution" >&2
            exit 1
        fi
      changed_when: false

    - name: "[Facts] Сбор системных фактов после установки Python"
      setup:

    - name: "[Общее] Проверка поддерживаемой ОС (Debian/Ubuntu или Arch)"
      fail:
        msg: "Неподдерживаемая ОС. Требуется Debian/Ubuntu или Arch Linux"
      when:
        - ansible_facts['os_family'] != 'Debian'
        - ansible_facts['os_family'] != 'Archlinux'

    - name: "[Bootstrap] Запуск сценария базовой настройки ОС"
      include_tasks: tasks/bootstrap_os.yml

  handlers:
    - name: Restart SSH
      ansible.builtin.systemd:
        name: "{{ 'ssh' if ansible_facts['os_family'] == 'Debian' else 'sshd' }}"
        state: restarted

- name: "[Git] Синхронизация репозитория ServeHub-2"
  hosts: vps, local
  vars_files:
    - vars/secrets.yml
  become: yes
  tasks:
    - name: "[Git] Клонирование или обновление репозитория ServeHub-2"
      ansible.builtin.git:
        repo: "https://github.com/canntstand/ServeHub-2"
        dest: "/home/{{ deploy_user }}/ServeHub-2"
        clone: yes
        update: yes
        force: yes
      become: true
      become_user: "{{ deploy_user }}"

    - name: "[Общее] Генерация файла .env из шаблона env.j2"
      ansible.builtin.template:
        src: env.j2
        dest: "/home/{{ deploy_user }}/ServeHub-2/.env"
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: "0600"

- name: "[Pause] Ожидание конфигурации данных приложений и SSL на VPS"
  hosts: localhost
  vars_files:
    - vars/secrets.yml
  tasks:
    - name: "[Pause] Пауза для ручного переноса apps-data и certbot на VPS"
      ansible.builtin.pause:
        prompt: |
          ======================================================================
          ⚙️ МИГРАЦИЯ ДАННЫХ И СЕРТИФИКАТОВ НА VPS (РУЧНОЙ ШАГ):
          ======================================================================
          Если вы заново разворачиваете проект или переезжаете на новый сервер,
          выполните следующие действия в /home/{{ vps_user }}/ServeHub-2/ на VPS:
          
          1. 📁 ДАННЫЕ ПРИЛОЖЕНИЙ (ПРИ ПЕРЕЕЗДЕ):
             Скопируйте вашу старую папку 'apps-data' в корень репозитория.
             Если шаг пропустить, сервисы (wg-easy, adguard) запустятся с нуля.
          
          2. 📄 SSL-СЕРТИФИКАТЫ:
             Если у вас остались старые рабочие сертификаты, положите папку 
             'certbot' также в корень репозитория.
             Если шаг пропустить, Certbot запросит новые сертификаты через DNS API 
             самостоятельно (это может занять около 20 минут).
          
          Для переноса файлов используйте rsync/scp или подключитесь по SSH:
          ssh {{ vps_user }}@{{ vps_public_ip }}
          ======================================================================
          Как только файлы на месте (или шаги пропущены), нажмите ENTER для продолжения...

- name: "Настройка удалённой инфраструктуры (VPS)"
  hosts: vps
  vars_files:
    - vars/secrets.yml
  become: yes
  tasks:
    - name: "[VPS] Запуск нативных задач настройки удалённого сервера"
      include_tasks: tasks/setup_remote.yml

- name: "[Pause] Ожидание конфигурации WireGuard"
  hosts: localhost
  vars_files:
    - vars/secrets.yml
  tasks:
    - name: "[Pause] Пауза для ручной конфигурации WireGuard и данных на Local"
      ansible.builtin.pause:
        prompt: |
          ======================================================================
          ⚙️ НАСТРОЙКА WIREGUARD И ДАННЫХ НА LOCAL SERVER (РУЧНОЙ ШАГ):
          ======================================================================
          Выполните шаги для связывания локального сервера с удаленной VPS:
          
          1. 🌐 ГЕНЕРАЦИЯ КОНФИГА WIREGUARD:
             - Откройте SSH-туннель до панели: ssh -L 8000:127.0.0.1:51821 {{ local_user }}@{{ vps_public_ip }}
             - Зайдите в веб-интерфейс: http://127.0.0.1:8000
             - Включите Prometheus в настройках wg-easy (если требуется).
             - Создайте клиента для локального сервера с фиксированным IP 10.8.0.2.
             - Сохраните конфиг на локальном сервере по пути:
               /home/{{ local_user }}/ServeHub-2/configs/amnezia/awg0.conf
          
          2. 📁 ДАННЫЕ ПРИЛОЖЕНИЙ (ПРИ ПЕРЕЕЗДЕ):
             - Положите старую папку 'apps-data' в /home/{{ local_user }}/ServeHub-2/
             - Положите папку 'PersonalData' в /home/{{ local_user }}/
          
          Для проверки или переноса данных вы можете подключиться по SSH:
          ssh {{ local_user }}@{{ local_private_ip }}
          ======================================================================
          Как только конфигурация awg0.conf на месте, нажмите ENTER для продолжения...

- name: "Настройка локальной инфраструктуры (Local Server)"
  hosts: local
  vars_files:
    - vars/secrets.yml
  become: yes
  tasks:
    - name: "Проверка наличия конфигурационного файла"
      ansible.builtin.stat:
        path: "/home/{{ deploy_user }}/ServeHub-2/configs/amnezia/awg0.conf"
      register: wg_config

    - name: "Ошибка: отсутствует файл конфигурации WireGuard"
      ansible.builtin.fail:
        msg: "WireGuard конфиг не найден! Пожалуйста, создайте его перед продолжением."
      when: not wg_config.stat.exists

    - name: "[Local] Запуск нативных задач настройки локального сервера"
      include_tasks: tasks/setup_local.yml
