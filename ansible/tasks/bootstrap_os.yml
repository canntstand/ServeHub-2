# =========================================================================
# ПОДГОТОВКА ПЕРЕМЕННЫХ
# =========================================================================
- name: "Определение целевого пользователя для текущего хоста (VPS)"
  set_fact:
    deploy_user: "{{ vps_user }}"
  when: "'vps' in group_names"

- name: "Определение целевого пользователя для текущего хоста (Local)"
  set_fact:
    deploy_user: "{{ local_user }}"
  when: "'local' in group_names"

# =========================================================================
# ПУНКТ 1: ОБНОВЛЕНИЕ СИСТЕМЫ
# =========================================================================
- name: "APT: Обновление кэша и пакетов (Ubuntu/Debian)"
  apt:
    update_cache: yes
    upgrade: safe
  when: ansible_os_family == "Debian"

- name: "PACMAN: Обновление системы (Arch Linux)"
  pacman:
    update_cache: yes
    upgrade: yes
    extra_args: --noconfirm
  when: ansible_os_family == "Archlinux"

# =========================================================================
# ПУНКТ 2: НАСТРОЙКА SSH И ПОЛЬЗОВАТЕЛЕЙ
# =========================================================================
- name: "Юзер: Создание пользователя {{ deploy_user }} и добавление в группы"
  user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    groups: "{{ 'sudo' if ansible_os_family == 'Debian' else 'wheel' }}"
    append: yes
    state: present

- name: "Sudoers: Настройка беспарольного sudo для {{ deploy_user }}"
  lineinfile:
    path: /etc/sudoers.d/90-ansible-users
    line: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
    validate: '/usr/sbin/visudo -cf %s'
    create: yes
    mode: '0440'

- name: "SSH: Проброс публичного SSH-ключа"
  authorized_key:
    user: "{{ deploy_user }}"
    state: present
    key: "{{ ssh_public_key }}"

- name: "SSH Конфиг: Настройка параметров безопасности в основном файле"
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries 3' }
    - { regexp: '^#?PermitEmptyPasswords', line: 'PermitEmptyPasswords no' }
  notify: Restart SSH

- name: "SSH Конфиг: Проверка наличия директории sshd_config.d"
  stat:
    path: /etc/ssh/sshd_config.d
  register: sshd_d_dir

- name: "SSH Конфиг: Поиск дополнительных файлов конфигурации в sshd_config.d"
  find:
    paths: /etc/ssh/sshd_config.d
    patterns: "*.conf"
  register: sshd_dropins
  when: sshd_d_dir.stat.exists and sshd_d_dir.stat.isdir

- name: "SSH Конфиг: Отключение PasswordAuthentication во всех вложенных файлах .conf"
  lineinfile:
    path: "{{ item.path }}"
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  loop: "{{ sshd_dropins.files | default([]) }}"
  notify: Restart SSH
  when: >
    sshd_d_dir.stat.exists and 
    sshd_d_dir.stat.isdir and 
    sshd_dropins.matched is defined and 
    sshd_dropins.matched > 0

- name: "Fail2ban: Установка пакета (Ubuntu/Debian)"
  apt:
    name: fail2ban
    state: present
  when: ansible_os_family == "Debian"

- name: "Fail2ban: Установка пакета (Arch Linux)"
  pacman:
    name: fail2ban
    state: present
  when: ansible_os_family == "Archlinux"

- name: "Fail2ban: Копирование вашего кастомного jail.local"
  copy:
    src: "../configs/fail2ban/jail.local"
    dest: "/etc/fail2ban/jail.local"
    owner: root
    group: root
    mode: '0644'
  register: fail2ban_config

- name: "Fail2ban: Включение автозагрузки и запуск службы"
  systemd:
    name: fail2ban
    state: restarted
    enabled: yes
    daemon_reload: yes
  when: fail2ban_config.changed

# =========================================================================
# ПУНКТ 3: УСТАНОВКА DOCKER
# =========================================================================
- name: "Docker: Удаление старых конфликтующих пакетов дистрибутива (Ubuntu/Debian)"
  apt:
    name: [docker.io, docker-compose, docker-compose-v2, docker-doc, podman-docker, containerd, runc]
    state: absent
    purge: yes
  when: ansible_os_family == "Debian"

- name: "Docker: Установка базовых утилит (Ubuntu/Debian)"
  apt:
    name: [ca-certificates, curl, gnupg]
    state: present
  when: ansible_os_family == "Debian"

- name: "Docker: Создание директории для ключей репозиториев (/etc/apt/keyrings)"
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when: ansible_os_family == "Debian"

- name: "Docker: Скачивание официального GPG ключа (динамически для Ubuntu или Debian)"
  get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  when: ansible_os_family == "Debian"

- name: "Docker: Добавление официального репозитория с привязкой ключа (Signed-By)"
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
    filename: docker
    state: present
  when: ansible_os_family == "Debian"

- name: "Docker: Установка Docker Engine и официального плагина Compose (Ubuntu/Debian)"
  apt:
    name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
    update_cache: yes
    state: present
  when: ansible_os_family == "Debian"

- name: "Docker: Установка Docker и Compose (Arch Linux)"
  pacman:
    name: [docker, docker-compose]
    state: present
  when: ansible_os_family == "Archlinux"

- name: "Docker: Включение автозагрузки и запуск демона Docker"
  systemd:
    name: docker
    state: started
    enabled: yes

- name: "Docker: Добавление пользователя {{ deploy_user }} в группу docker"
  user:
    name: "{{ deploy_user }}"
    groups: docker
    append: yes

# ====================================================================
# ШАГ 4: Установка AmneziaWG
# ====================================================================
- name: Ubuntu/Debian | Установка утилит сборки и заголовков текущего ядра
  apt:
    name:
        - software-properties-common
        - python3-launchpadlib
        - gnupg2
        - "linux-headers-{{ ansible_kernel }}"
    state: present
  when: ansible_os_family == "Debian"

- name: Arch | Установка базовых утилит сборки и заголовков ядра
  pacman:
    name:
      - linux-headers
      - base-devel
  state: present
  when: ansible_os_family == "Archlinux"

- name: Ubuntu | Добавление официального PPA AmneziaWG
  apt_repository:
    repo: 'ppa:amnezia/ppa'
    state: present
  when: ansible_distribution == "Ubuntu"

- name: Debian | Добавление репозитория AmneziaWG
  block:
    - name: Debian | Добавление GPG-ключа репозитория
      apt_key:
        keyserver: keyserver.ubuntu.com
        id: 57290828
        state: present

    - name: Debian | Добавление репозитория в sources.list
      apt_repository:
      repo: "deb https://ppa.launchpadcontent.net/amnezia/ppa/ubuntu focal main"
      state: present
  when: ansible_distribution == "Debian"

- name: Ubuntu/Debian | Установка пакета amneziawg
  apt:
    name: amneziawg
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Arch | Установка amneziawg через yay (AUR)
  shell: "yay -S --needed --noconfirm amneziawg-dkms amneziawg-tools"
  become: true
  become_user: "{{ deploy_user }}"
  register: yay_output
  changed_when: "'Installing' in yay_output.stdout"
  when: ansible_os_family == "Archlinux"

# ====================================================================
# ШАГ 5: Запуск и автозагрузка Docker
# ====================================================================
- name: Включение службы Docker в автозагрузку и ее запуск
  systemd:
    name: docker
    enabled: yes
    state: started

# ====================================================================
# ШАГ 6: Клонирование репозитория
# ====================================================================
- name: Установка Git (Ubuntu/Debian)
  apt:
    name: git
    state: present
  when: ansible_os_family == "Debian"

- name: Arch | Установка Git
  pacman:
    name: git
    state: present
  when: ansible_os_family == "Archlinux"

- name: Клонирование репозитория ServeHub-2
  git:
    repo: 'https://github.com/canntstand/ServeHub-2'
    dest: "/home/{{ deploy_user }}/ServeHub-2"
    clone: yes
    update: yes
  become: true
  become_user: "{{ deploy_user }}"

# ====================================================================
# ШАГ 7: Настройка окружения (.env)
# ====================================================================
- name: Генерация файла .env из шаблона env.j2
  template:
    src: env.j2
    dest: "/home/{{ deploy_user }}/ServeHub-2/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0600'