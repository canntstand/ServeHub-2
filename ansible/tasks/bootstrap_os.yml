# =========================================================================
# 1. СОЗДАНИЕ ПОЛЬЗОВАТЕЛЯ
# =========================================================================
- name: "[User] Создание пользователя {{ deploy_user }} и добавление в группы (sudo/wheel)"
  user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    groups: "{{ 'sudo' if ansible_facts['os_family'] == 'Debian' else 'wheel' }}"
    append: yes
    state: present

- name: "[Sudoers] Настройка беспарольного sudo для {{ deploy_user }}"
  lineinfile:
    path: /etc/sudoers.d/90-ansible-users
    line: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
    validate: "visudo -cf %s"
    create: yes
    mode: "0440"

# =========================================================================
# 2. ПОЛНОЕ ОБНОВЛЕНИЕ ОС
# =========================================================================
- name: "[APT] Debian/Ubuntu: обновление кэша и пакетов (включая ядро)"
  apt:
    update_cache: yes
    upgrade: safe
  when: ansible_facts['os_family'] == "Debian"

- name: Обновление ключей Arch Linux
  community.general.pacman:
    name: archlinux-keyring
    state: latest
    update_cache: yes
  when: ansible_facts['os_family'] == "Archlinux"

- name: "[Pacman] Arch: полное обновление системы"
  pacman:
    update_cache: yes
    upgrade: yes
    extra_args: --noconfirm
  when: ansible_facts['os_family'] == "Archlinux"

# =========================================================================
# 3. ПРОВЕРКА ЯДРА И ПЕРЕЗАГРУЗКА (ДЛЯ ВСЕХ ОС)
# =========================================================================
- name: "[Kernel] Debian/Ubuntu: проверка расхождения версий запущенного и установленного ядра"
  shell: |
    running_kernel="$(uname -r)"
    latest_installed_kernel="$(dpkg -l 'linux-image-[0-9]*' | awk '/^ii/ {print $2}' | grep -v 'extra' | sort -V | tail -n1 | sed 's/linux-image-//')"
    if [ "$running_kernel" != "$latest_installed_kernel" ]; then
      echo "reboot_needed"
    else
      echo "ok"
    fi
  register: ubuntu_kernel_check
  changed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: "[Kernel] Arch: проверка расхождения версий ядра"
  shell: |
    running=$(uname -r)
    installed_pkg=$(pacman -Q | grep -E '^linux(-lts|-zen)? ' | awk '{print $2}' | head -n1)
    if [[ "$running" != *"$installed_pkg"* ]]; then
      echo "reboot_needed"
    else
      echo "ok"
    fi
  args:
    executable: /bin/bash
  register: arch_kernel_check
  changed_when: false
  when: ansible_facts['os_family'] == "Archlinux"

- name: "[Reboot] Debian/Ubuntu: отправка команды на перезагрузку"
  ansible.builtin.shell: "sleep 2 && shutdown -r now"
  async: 1
  poll: 0
  when: ansible_facts['os_family'] == "Debian" and ubuntu_kernel_check.stdout == "reboot_needed"

- name: "[Reboot] Arch: отправка команды на перезагрузку"
  ansible.builtin.shell: "sleep 2 && shutdown -r now"
  async: 1
  poll: 0
  when: ansible_facts['os_family'] == "Archlinux" and arch_kernel_check.stdout == "reboot_needed"

- name: "[Reboot] Ожидание поднятия сервера после перезагрузки"
  ansible.builtin.wait_for_connection:
    connect_timeout: 10
    timeout: 300
    delay: 10
  vars:
    ansible_user: "{{ deploy_user }}"
  when: >
    (ansible_facts['os_family'] == "Debian" and ubuntu_kernel_check.stdout == "reboot_needed") or
    (ansible_facts['os_family'] == "Archlinux" and arch_kernel_check.stdout == "reboot_needed")

# =========================================================================
# 4. УСТАНОВКА БАЗОВЫХ ПАКЕТОВ
# =========================================================================
- name: "[Pacman] Arch: установка базовых пакетов"
  pacman:
    name: [docker, docker-compose, linux-headers, dkms, git, fail2ban, fakeroot, binutils, make, gcc, patch, sudo, debugedit, borg, borgmatic, gettext, argon2, openssl, curl]
    state: present
    extra_args: --noconfirm
  when: ansible_facts['os_family'] == "Archlinux"

- name: "[AmneziaWG] Debian/Ubuntu: установка утилит сборки и заголовков актуального ядра + некоторые доп. пакеты"
  apt:
    name:
      - software-properties-common
      - python3-launchpadlib
      - gnupg2
      - git
      - dkms
      - borgbackup
      - pipx
      - gettext
      - argon2
      - openssl
      - fail2ban
      - curl
      - "{{ 'linux-headers-generic' if ansible_facts['distribution'] == 'Ubuntu' else 'linux-headers-amd64' }}"
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: "[Backup] Debian/Ubuntu: Установка актуальной версии borgmatic через pipx"
  environment:
    PIPX_HOME: /opt/pipx
    PIPX_BIN_DIR: /usr/local/bin
  ansible.builtin.command: pipx install borgmatic
  args:
    creates: /usr/local/bin/borgmatic
  when: ansible_facts['os_family'] == "Debian"

# =========================================================================
# 5. НАСТРОЙКА SSH И БЕЗОПАСНОСТИ
# =========================================================================
- name: "[SSH] Добавление публичного ключа для пользователя {{ deploy_user }}"
  authorized_key:
    user: "{{ deploy_user }}"
    state: present
    key: "{{ ssh_public_key }}"

- name: "[SSH] Настройка параметров безопасности в основном файле /etc/ssh/sshd_config"
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
    - { regexp: "^#?MaxAuthTries", line: "MaxAuthTries 3" }
    - { regexp: "^#?PermitEmptyPasswords", line: "PermitEmptyPasswords no" }
  notify: Restart SSH

- name: "[SSH] Проверка наличия директории /etc/ssh/sshd_config.d"
  stat:
    path: /etc/ssh/sshd_config.d
  register: sshd_d_dir

- name: "[SSH] Поиск дополнительных .conf-файлов в sshd_config.d"
  find:
    paths: /etc/ssh/sshd_config.d
    patterns: "*.conf"
  register: sshd_dropins
  when: sshd_d_dir.stat.exists and sshd_d_dir.stat.isdir

- name: "[SSH] Отключение PasswordAuthentication во всех файлах sshd_config.d/*.conf"
  lineinfile:
    path: "{{ item.path }}"
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  loop: "{{ sshd_dropins.files | default([]) }}"
  notify: Restart SSH
  when: >-
    sshd_d_dir.stat.exists and 
    sshd_d_dir.stat.isdir and 
    sshd_dropins.matched is defined and 
    sshd_dropins.matched > 0

- name: "[Fail2ban] Копирование кастомного jail.local"
  copy:
    src: "../configs/fail2ban/jail.local"
    dest: "/etc/fail2ban/jail.local"
    owner: root
    group: root
    mode: "0644"
  register: fail2ban_config

- name: "[Fail2ban] Включение автозагрузки и контроль состояния"
  systemd:
    name: fail2ban
    state: "{{ 'restarted' if fail2ban_config.changed else 'started' }}"
    enabled: yes
    daemon_reload: yes

# =========================================================================
# 6. УСТАНОВКА DOCKER (Debian/Ubuntu)
# =========================================================================
- name: "[Docker] Debian/Ubuntu: удаление старых конфликтующих пакетов"
  apt:
    name:
      [
        docker.io,
        docker-compose,
        docker-compose-v2,
        docker-doc,
        podman-docker,
        containerd,
        runc,
      ]
    state: absent
    purge: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: установка базовых утилит"
  apt:
    name: [ca-certificates, curl, gnupg]
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: создание /etc/apt/keyrings"
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: скачивание GPG-ключа"
  get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: добавление репозитория"
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} stable"
    filename: docker
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: установка Engine"
  apt:
    name:
      [
        docker-ce,
        docker-ce-cli,
        containerd.io,
        docker-buildx-plugin,
        docker-compose-plugin,
      ]
    update_cache: yes
    state: present
  when: ansible_facts['os_family'] == "Debian"

# =========================================================================
# 7. ЗАПУСК DOCKER (общий для всех ОС)
# =========================================================================
- name: "[Docker] Запуск демона и добавление в автозагрузку"
  systemd:
    name: docker
    state: started
    enabled: yes
  register: docker_start
  retries: 3
  delay: 10
  until: docker_start is success

- name: "[Docker] Проверка работоспособности"
  shell: docker info
  register: docker_info
  changed_when: false
  retries: 2
  delay: 5
  until: docker_info.rc == 0

- name: "[Docker] Добавление пользователя {{ deploy_user }} в группу docker"
  user:
    name: "{{ deploy_user }}"
    groups: docker
    append: yes

# =========================================================================
# 8. УСТАНОВКА AmneziaWG
# =========================================================================
- name: "[Net] Разрешить привязку к несуществующим IP (ip_nonlocal_bind)"
  ansible.posix.sysctl:
    name: net.ipv4.ip_nonlocal_bind
    value: '1'
    state: present
    reload: yes

- name: "[Yay] Arch: проверка наличия yay"
  stat:
    path: /usr/bin/yay
  when: ansible_facts['os_family'] == "Archlinux"
  register: yay_installed

- name: "[Yay] Arch: установка зависимостей для сборки"
  pacman:
    name:
      - base-devel
      - git
    state: present
  become: true
  when: ansible_facts['os_family'] == "Archlinux" and not yay_installed.stat.exists

- name: "[Yay] Arch: установка готового yay-bin"
  when: ansible_facts['os_family'] == "Archlinux" and not yay_installed.stat.exists
  block:
    - name: "[Yay] Arch: клонирование репозитория yay-bin"
      git:
        repo: https://aur.archlinux.org/yay-bin.git
        dest: "/tmp/yay-bin"
        force: yes
      become: true
      become_user: "{{ deploy_user }}"

    - name: "[Yay] Arch: подготовка пакета yay-bin"
      command: makepkg -s --noconfirm
      args:
        chdir: "/tmp/yay-bin"
      become: true
      become_user: "{{ deploy_user }}"

    - name: "[Yay] Arch: установка пакета через pacman"
      shell: pacman -U --noconfirm yay-bin-*.pkg.tar.zst
      args:
        chdir: "/tmp/yay-bin"
      become: true

  always:
    - name: "[Yay] Arch: очистка временных файлов сборки"
      file:
        path: "/tmp/yay-bin"
        state: absent
      become: true

- name: "[AmneziaWG] Arch: установка amneziawg из AUR"
  become: true
  become_user: "{{ deploy_user }}"
  shell: "yay -S --needed --noconfirm amneziawg-dkms amneziawg-tools"
  register: yay_output
  changed_when: "'Installing' in yay_output.stdout or 'upgraded' in yay_output.stdout"
  when: ansible_facts['os_family'] == "Archlinux"

- name: "[AmneziaWG] Ubuntu: создаем папку для ключей"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: "[AmneziaWG] Ubuntu: скачиваем GPG-ключ напрямую"
  ansible.builtin.get_url:
    url: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x75C9DD72C799870E310542E24166F2C257290828"
    dest: /etc/apt/keyrings/amnezia.asc
    mode: '0644'

- name: "[AmneziaWG] Ubuntu: добавляем репозиторий"
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/amnezia.asc] https://ppa.launchpadcontent.net/amnezia/ppa/ubuntu focal main"
    state: present
    update_cache: yes
  when: ansible_facts['distribution'] == "Ubuntu"

- name: "[AmneziaWG] Debian: добавление репозитория AmneziaWG"
  block:
    - name: "[AmneziaWG] Debian: скачивание GPG-ключа"
      ansible.builtin.get_url:
        url: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x57290828"
        dest: /etc/apt/keyrings/amnezia-ppa.asc
        mode: "0644"

    - name: "[AmneziaWG] Debian: добавление репозитория (deb)"
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/amnezia-ppa.asc] https://ppa.launchpadcontent.net/amnezia/ppa/ubuntu focal main"
        filename: amnezia
        state: present

    - name: "[AmneziaWG] Debian: добавление репозитория (deb-src)"
      apt_repository:
        repo: "deb-src [signed-by=/etc/apt/keyrings/amnezia-ppa.asc] https://ppa.launchpadcontent.net/amnezia/ppa/ubuntu focal main"
        filename: amnezia
        state: present
  when: ansible_facts['distribution'] == "Debian"

- name: "[AmneziaWG] Debian/Ubuntu: установка пакетов amneziawg и утилит"
  apt:
    name:
      - amneziawg
      - amneziawg-tools
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "[AmneziaWG] Arch: исправление совместимости с ядром 7.x+ (ipv6_stub)"
  block:
    - name: "[AmneziaWG] Arch: проверяем наличие исходников в /usr/src"
      ansible.builtin.stat:
        path: /usr/src/amneziawg-1.0.0/socket.c
      register: amneziawg_source

    - name: "[AmneziaWG] Arch: замена ipv6_stub на ip6_dst_lookup_flow"
      ansible.builtin.replace:
        path: /usr/src/amneziawg-1.0.0/socket.c
        regexp: 'ipv6_stub->ipv6_dst_lookup_flow'
        replace: 'ip6_dst_lookup_flow'
      register: patch_result
      when: amneziawg_source.stat.exists

    - name: "[AmneziaWG] Arch: принудительная пересборка модуля после патча"
      ansible.builtin.shell: |
        dkms remove amneziawg/1.0.0 --all || true
        dkms add -m amneziawg -v 1.0.0 || true
        dkms build -m amneziawg -v 1.0.0
        dkms install -m amneziawg -v 1.0.0
      become: true
      when: patch_result.changed
  when: ansible_facts['os_family'] == "Archlinux"

- name: "[DKMS] Принудительный запуск сборки модулей"
  ansible.builtin.shell: |
    dkms autoinstall -k $(uname -r)
    modprobe amneziawg
  register: dkms_modprobe
  failed_when: dkms_modprobe.rc != 0
  changed_when: false