# =========================================================================
# ПУНКТ 1: СОЗДАНИЕ ПОЛЬЗОВАТЕЛЯ (до установки пакетов, чтобы в Arch блоке был пользователь)
# =========================================================================
- name: "Юзер: Создание пользователя {{ deploy_user }} и добавление в группы"
  user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    groups: "{{ 'sudo' if ansible_facts['os_family'] == 'Debian' else 'wheel' }}"
    append: yes
    state: present

- name: "Sudoers: Настройка беспарольного sudo для {{ deploy_user }}"
  lineinfile:
    path: /etc/sudoers.d/90-ansible-users
    line: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
    validate: "/usr/sbin/visudo -cf %s"
    create: yes
    mode: "0440"

# =========================================================================
# ПУНКТ 2: ОБНОВЛЕНИЕ СИСТЕМЫ И УСТАНОВКА БАЗОВЫХ ПАКЕТОВ
# =========================================================================
- name: "APT: Обновление кэша и пакетов (Ubuntu/Debian)"
  apt:
    update_cache: yes
    upgrade: safe
  when: ansible_facts['os_family'] == "Debian"

- name: "Arch: Полное обновление системы и установка всех необходимых пакетов"
  block:
    - name: "Arch: Полное обновление системы"
      pacman:
        update_cache: yes
        upgrade: yes
        extra_args: --noconfirm

    - name: "Arch: Установка всех необходимых пакетов (включая инструменты сборки)"
      pacman:
        name:
          - docker
          - docker-compose
          - linux-headers
          - dkms
          - git
          - fail2ban
          - fakeroot
          - binutils
          - make
          - gcc
          - patch
          - sudo
        state: present
        extra_args: --noconfirm

    - name: "Arch: Проверка наличия yay"
      stat:
        path: /usr/bin/yay
      register: yay_installed

    - name: "Arch: Установка yay из AUR (если отсутствует)"
      become: true
      become_user: "{{ deploy_user }}"
      when: not yay_installed.stat.exists
      block:
        - name: "Arch: Клонирование yay"
          git:
            repo: https://aur.archlinux.org/yay.git
            dest: "/home/{{ deploy_user }}/yay"
            force: yes

        - name: "Arch: Сборка yay"
          shell: makepkg -si --noconfirm
          args:
            chdir: "/home/{{ deploy_user }}/yay"

        - name: "Arch: Очистка исходников yay"
          file:
            path: "/home/{{ deploy_user }}/yay"
            state: absent

    - name: "Arch: Установка amneziawg из AUR"
      become: true
      become_user: "{{ deploy_user }}"
      shell: "yay -S --needed --noconfirm amneziawg-dkms amneziawg-tools"
      register: yay_output
      changed_when: "'Installing' in yay_output.stdout or 'upgraded' in yay_output.stdout"

    - name: "Arch: Загрузка модуля amneziawg (проверка)"
      shell: modprobe amneziawg || true
      changed_when: false

    - name: "Arch: Проверка расхождения версий ядра"
      shell: |
        running=$(uname -r | sed 's/-arch.*//')
        installed=$(pacman -Q linux | awk '{print $2}' | sed 's/\.arch.*//' | sed 's/-.*//')
        if [ "$running" != "$installed" ]; then
          echo "reboot_needed"
        else
          echo "ok"
        fi
      register: kernel_check
      changed_when: false

    - name: "Arch: Отправка команды на перезагрузку"
      ansible.builtin.shell: "sleep 2 && shutdown -r now"
      async: 1
      poll: 0
      when: kernel_check.stdout == "reboot_needed" and ansible_facts['os_family'] == "Archlinux"

    - name: "Ожидание поднятия сервера под пользователем {{ deploy_user }}"
      ansible.builtin.wait_for_connection:
        connect_timeout: 10
        timeout: 300
        delay: 10
      vars:
        ansible_user: "{{ deploy_user }}"
      when: kernel_check.stdout == "reboot_needed" and ansible_facts['os_family'] == "Archlinux"

    - name: "Arch: Проверка и пересборка DKMS модулей после перезагрузки"
      shell: |
        dkms status | grep -q amneziawg || dkms autoinstall
        modprobe amneziawg || true
      changed_when: false
      when: kernel_check.stdout == "reboot_needed"

  when: ansible_facts['os_family'] == "Archlinux"

# =========================================================================
# ПУНКТ 3: НАСТРОЙКА SSH И БЕЗОПАСНОСТИ
# =========================================================================
- name: "SSH: Проброс публичного SSH-ключа для {{ deploy_user }}"
  authorized_key:
    user: "{{ deploy_user }}"
    state: present
    key: "{{ ssh_public_key }}"

- name: "SSH Конфиг: Настройка параметров безопасности в основном файле"
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
    - { regexp: "^#?MaxAuthTries", line: "MaxAuthTries 3" }
    - { regexp: "^#?PermitEmptyPasswords", line: "PermitEmptyPasswords no" }
  notify: Restart SSH

- name: "SSH Конфиг: Проверка наличия директории sshd_config.d"
  stat:
    path: /etc/ssh/sshd_config.d
  register: sshd_d_dir

- name: "SSH Конфиг: Поиск дополнительных файлов конфигурации в sshd_config.d"
  find:
    paths: /etc/ssh/sshd_config.d
    patterns: "*.conf"
  register: sshd_dropins
  when: sshd_d_dir.stat.exists and sshd_d_dir.stat.isdir

- name: "SSH Конфиг: Отключение PasswordAuthentication во всех вложенных файлах .conf"
  lineinfile:
    path: "{{ item.path }}"
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  loop: "{{ sshd_dropins.files | default([]) }}"
  notify: Restart SSH
  when: >
    sshd_d_dir.stat.exists and 
    sshd_d_dir.stat.isdir and 
    sshd_dropins.matched is defined and 
    sshd_dropins.matched > 0

- name: "Fail2ban: Установка пакета (Ubuntu/Debian)"
  apt:
    name: fail2ban
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: "Fail2ban: Копирование кастомного jail.local"
  copy:
    src: "../configs/fail2ban/jail.local"
    dest: "/etc/fail2ban/jail.local"
    owner: root
    group: root
    mode: "0644"
  register: fail2ban_config

- name: "Fail2ban: Включение автозагрузки и запуск службы"
  systemd:
    name: fail2ban
    state: restarted
    enabled: yes
    daemon_reload: yes
  when: fail2ban_config.changed

# =========================================================================
# ПУНКТ 4: УСТАНОВКА DOCKER (Debian/Ubuntu)
# =========================================================================
- name: "Docker: Удаление старых конфликтующих пакетов (Ubuntu/Debian)"
  apt:
    name:
      [
        docker.io,
        docker-compose,
        docker-compose-v2,
        docker-doc,
        podman-docker,
        containerd,
        runc,
      ]
    state: absent
    purge: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "Docker: Установка базовых утилит (Ubuntu/Debian)"
  apt:
    name: [ca-certificates, curl, gnupg]
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: "Docker: Создание директории для ключей репозиториев (/etc/apt/keyrings)"
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_facts['os_family'] == "Debian"

- name: "Docker: Скачивание официального GPG ключа"
  get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: "Docker: Добавление официального репозитория с привязкой ключа (Signed-By)"
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} stable"
    filename: docker
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: "Docker: Установка Docker Engine и плагина Compose (Ubuntu/Debian)"
  apt:
    name:
      [
        docker-ce,
        docker-ce-cli,
        containerd.io,
        docker-buildx-plugin,
        docker-compose-plugin,
      ]
    update_cache: yes
    state: present
  when: ansible_facts['os_family'] == "Debian"

# =========================================================================
# ПУНКТ 5: ЗАПУСК DOCKER (общий для всех ОС)
# =========================================================================
- name: "Docker: Запуск демона и добавление в автозагрузку"
  systemd:
    name: docker
    state: started
    enabled: yes
  register: docker_start
  retries: 3
  delay: 10
  until: docker_start is success

- name: "Docker: Проверка работоспособности"
  shell: docker info
  register: docker_info
  changed_when: false
  retries: 2
  delay: 5
  until: docker_info.rc == 0

- name: "Docker: Добавление пользователя {{ deploy_user }} в группу docker"
  user:
    name: "{{ deploy_user }}"
    groups: docker
    append: yes

# =========================================================================
# ПУНКТ 6: УСТАНОВКА AmneziaWG (Debian/Ubuntu)
# =========================================================================
- name: "Ubuntu/Debian: Установка утилит сборки и заголовков текущего ядра"
  apt:
    name:
      - software-properties-common
      - python3-launchpadlib
      - gnupg2
      - git 
      - linux-headers-generic
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "Ubuntu: Добавление официального PPA AmneziaWG"
  apt_repository:
    repo: "ppa:amnezia/ppa"
    state: present
  when: ansible_facts['distribution'] == "Ubuntu"

- name: "Debian: Добавление репозитория AmneziaWG"
  block:
    - name: "Debian: Добавление GPG-ключа репозитория"
      apt_key:
        keyserver: keyserver.ubuntu.com
        id: 57290828
        state: present

    - name: "Debian: Добавление репозитория в sources.list"
      apt_repository:
        repo: "deb https://ppa.launchpadcontent.net/amnezia/ppa/ubuntu focal main"
        state: present
  when: ansible_facts['distribution'] == "Debian"

- name: "Ubuntu/Debian: Установка пакета amneziawg"
  apt:
    name: amneziawg
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "Ubuntu/Debian: Проверка расхождения версий запущенного и установленного ядра"
  shell: |
    running_kernel="$(uname -r)"
    latest_installed_kernel="$(dpkg -l 'linux-image-[0-9]*' | awk '/^ii/ {print $2}' | grep -v 'extra' | sort -V | tail -n1 | sed 's/linux-image-//')"
    if [ "$running_kernel" != "$latest_installed_kernel" ]; then
      echo "reboot_needed"
    else
      echo "ok"
    fi
  register: ubuntu_kernel_check
  changed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: "Ubuntu/Debian: Отправка команды на перезагрузку"
  ansible.builtin.shell: "sleep 2 && shutdown -r now"
  async: 1
  poll: 0
  when: ubuntu_kernel_check.stdout == "reboot_needed" and ansible_facts['os_family'] == "Debian"

- name: "Ожидание поднятия сервера под пользователем {{ deploy_user }}"
  ansible.builtin.wait_for_connection:
    connect_timeout: 10
    timeout: 300
    delay: 10
  vars:
    ansible_user: "{{ deploy_user }}"
  when: ubuntu_kernel_check.stdout == "reboot_needed" and ansible_facts['os_family'] == "Debian"

- name: "Ubuntu/Debian: Принудительный контроль сборки DKMS и загрузка модуля"
  shell: |
    dkms autoinstall -k $(uname -r) || true
    modprobe amneziawg
  register: modprobe_result
  changed_when: false
  when: ansible_facts['os_family'] == "Debian"