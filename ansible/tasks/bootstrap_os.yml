# =========================================================================
# 1. СОЗДАНИЕ ПОЛЬЗОВАТЕЛЯ
# =========================================================================
- name: "[User] Создание пользователя {{ deploy_user }} и добавление в группы (sudo/wheel)"
  user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    groups: "{{ 'sudo' if ansible_facts['os_family'] == 'Debian' else 'wheel' }}"
    append: yes
    state: present

- name: "[Sudoers] Настройка беспарольного sudo для {{ deploy_user }}"
  lineinfile:
    path: /etc/sudoers.d/90-ansible-users
    line: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL"
    validate: "/usr/sbin/visudo -cf %s"
    create: yes
    mode: "0440"

# =========================================================================
# 2. ОБНОВЛЕНИЕ СИСТЕМЫ И УСТАНОВКА БАЗОВЫХ ПАКЕТОВ
# =========================================================================
- name: "[APT] Debian/Ubuntu: обновление кэша и пакетов"
  apt:
    update_cache: yes
    upgrade: safe
  when: ansible_facts['os_family'] == "Debian"

- name: "[Pacman] Arch: полное обновление системы и установка пакетов"
  block:
    - name: "[Pacman] Arch: полное обновление системы"
      pacman:
        update_cache: yes
        upgrade: yes
        extra_args: --noconfirm

    - name: "[Pacman] Arch: установка базовых пакетов (docker, git, fail2ban и др.)"
      pacman:
        name:
          - docker
          - docker-compose
          - linux-headers
          - dkms
          - git
          - fail2ban
          - fakeroot
          - binutils
          - make
          - gcc
          - patch
          - sudo
        state: present
        extra_args: --noconfirm

    - name: "[Yay] Arch: проверка наличия yay (AUR helper)"
      stat:
        path: /usr/bin/yay
      register: yay_installed

    - name: "[Yay] Arch: установка yay из AUR (если отсутствует)"
      become: true
      become_user: "{{ deploy_user }}"
      when: not yay_installed.stat.exists
      block:
        - name: "[Yay] Arch: клонирование репозитория yay"
          git:
            repo: https://aur.archlinux.org/yay.git
            dest: "/home/{{ deploy_user }}/yay"
            force: yes

        - name: "[Yay] Arch: сборка и установка yay (makepkg)"
          shell: makepkg -si --noconfirm
          args:
            chdir: "/home/{{ deploy_user }}/yay"

        - name: "[Yay] Arch: очистка временных файлов yay"
          file:
            path: "/home/{{ deploy_user }}/yay"
            state: absent

    - name: "[AmneziaWG] Arch: установка amneziawg из AUR"
      become: true
      become_user: "{{ deploy_user }}"
      shell: "yay -S --needed --noconfirm amneziawg-dkms amneziawg-tools"
      register: yay_output
      changed_when: "'Installing' in yay_output.stdout or 'upgraded' in yay_output.stdout"

    - name: "[AmneziaWG] Arch: загрузка модуля amneziawg"
      shell: modprobe amneziawg || true
      changed_when: false

    - name: "[Kernel] Arch: проверка расхождения версий ядра"
      shell: |
        running=$(uname -r)
        installed_pkg=$(pacman -Q | grep -E '^linux(-lts|-zen)? ' | awk '{print $2}' | head -n1)
        if [[ "$running" != *"$installed_pkg"* ]]; then
          echo "reboot_needed"
        else
          echo "ok"
        fi
      args:
        executable: /bin/bash
      register: kernel_check
      changed_when: false

    - name: "[Reboot] Arch: отправка команды на перезагрузку (при необходимости)"
      ansible.builtin.shell: "sleep 2 && shutdown -r now"
      async: 1
      poll: 0
      when: kernel_check.stdout == "reboot_needed"

    - name: "[Reboot] Arch: ожидание поднятия сервера после перезагрузки (пользователь {{ deploy_user }})"
      ansible.builtin.wait_for_connection:
        connect_timeout: 10
        timeout: 300
        delay: 10
      vars:
        ansible_user: "{{ deploy_user }}"
      when: kernel_check.stdout == "reboot_needed"

    - name: "[DKMS] Arch: проверка и пересборка DKMS-модулей после перезагрузки"
      shell: |
        dkms status | grep -q amneziawg || dkms autoinstall
        modprobe amneziawg || true
      changed_when: false
      when: kernel_check.stdout == "reboot_needed"

  when: ansible_facts['os_family'] == "Archlinux"

# =========================================================================
# 3. НАСТРОЙКА SSH И БЕЗОПАСНОСТИ
# =========================================================================
- name: "[SSH] Добавление публичного ключа для пользователя {{ deploy_user }}"
  authorized_key:
    user: "{{ deploy_user }}"
    state: present
    key: "{{ ssh_public_key }}"

- name: "[SSH] Настройка параметров безопасности в основном файле /etc/ssh/sshd_config"
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
    - { regexp: "^#?MaxAuthTries", line: "MaxAuthTries 3" }
    - { regexp: "^#?PermitEmptyPasswords", line: "PermitEmptyPasswords no" }
  notify: Restart SSH

- name: "[SSH] Проверка наличия директории /etc/ssh/sshd_config.d"
  stat:
    path: /etc/ssh/sshd_config.d
  register: sshd_d_dir

- name: "[SSH] Поиск дополнительных .conf-файлов в sshd_config.d"
  find:
    paths: /etc/ssh/sshd_config.d
    patterns: "*.conf"
  register: sshd_dropins
  when: sshd_d_dir.stat.exists and sshd_d_dir.stat.isdir

- name: "[SSH] Отключение PasswordAuthentication во всех файлах sshd_config.d/*.conf"
  lineinfile:
    path: "{{ item.path }}"
    regexp: "^#?PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  loop: "{{ sshd_dropins.files | default([]) }}"
  notify: Restart SSH
  when: >-
    sshd_d_dir.stat.exists and 
    sshd_d_dir.stat.isdir and 
    sshd_dropins.matched is defined and 
    sshd_dropins.matched > 0

- name: "[Fail2ban] Debian/Ubuntu: установка пакета"
  apt:
    name: fail2ban
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: "[Fail2ban] Копирование кастомного jail.local"
  copy:
    src: "../configs/fail2ban/jail.local"
    dest: "/etc/fail2ban/jail.local"
    owner: root
    group: root
    mode: "0644"
  register: fail2ban_config

- name: "[Fail2ban] Включение автозагрузки и контроль состояния"
  systemd:
    name: fail2ban
    state: "{{ 'restarted' if fail2ban_config.changed else 'started' }}"
    enabled: yes
    daemon_reload: yes

# =========================================================================
# 4. УСТАНОВКА DOCKER (Debian/Ubuntu)
# =========================================================================
- name: "[Docker] Debian/Ubuntu: удаление старых конфликтующих пакетов"
  apt:
    name:
      [
        docker.io,
        docker-compose,
        docker-compose-v2,
        docker-doc,
        podman-docker,
        containerd,
        runc,
      ]
    state: absent
    purge: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: установка базовых утилит"
  apt:
    name: [ca-certificates, curl, gnupg]
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: создание /etc/apt/keyrings"
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: скачивание GPG-ключа"
  get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: добавление репозитория"
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} stable"
    filename: docker
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: "[Docker] Debian/Ubuntu: установка Engine"
  apt:
    name:
      [
        docker-ce,
        docker-ce-cli,
        containerd.io,
        docker-buildx-plugin,
        docker-compose-plugin,
      ]
    update_cache: yes
    state: present
  when: ansible_facts['os_family'] == "Debian"

# =========================================================================
# 5. ЗАПУСК DOCKER (общий для всех ОС)
# =========================================================================
- name: "[Docker] Запуск демона и добавление в автозагрузку"
  systemd:
    name: docker
    state: started
    enabled: yes
  register: docker_start
  retries: 3
  delay: 10
  until: docker_start is success

- name: "[Docker] Проверка работоспособности"
  shell: docker info
  register: docker_info
  changed_when: false
  retries: 2
  delay: 5
  until: docker_info.rc == 0

- name: "[Docker] Добавление пользователя {{ deploy_user }} в группу docker"
  user:
    name: "{{ deploy_user }}"
    groups: docker
    append: yes

# =========================================================================
# 6. УСТАНОВКА AmneziaWG (Debian/Ubuntu)
# =========================================================================
- name: "[AmneziaWG] Debian/Ubuntu: установка утилит сборки и заголовков ядра"
  apt:
    name:
      - software-properties-common
      - python3-launchpadlib
      - gnupg2
      - git
      - "{{ 'linux-headers-generic' if ansible_facts['distribution'] == 'Ubuntu' else 'linux-headers-amd64' }}"
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "[AmneziaWG] Ubuntu: добавление официального PPA amnezia/ppa"
  apt_repository:
    repo: "ppa:amnezia/ppa"
    state: present
  when: ansible_facts['distribution'] == "Ubuntu"

- name: "[AmneziaWG] Debian: добавление репозитория AmneziaWG (через Launchpad)"
  block:
    - name: "[AmneziaWG] Debian: скачивание GPG-ключа (Modern Way)"
      ansible.builtin.get_url:
        url: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x57290828"
        dest: /etc/apt/keyrings/amnezia-ppa.asc
        mode: "0644"

    - name: "[AmneziaWG] Debian: добавление репозитория в sources.list"
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/amnezia-ppa.asc] https://ppa.launchpadcontent.net/amnezia/ppa/ubuntu focal main"
        filename: amnezia
        state: present
  when: ansible_facts['distribution'] == "Debian"

- name: "[AmneziaWG] Debian/Ubuntu: установка пакета amneziawg"
  apt:
    name: amneziawg
    state: present
    update_cache: yes
  when: ansible_facts['os_family'] == "Debian"

- name: "[Kernel] Debian/Ubuntu: проверка расхождения версий запущенного и установленного ядра"
  shell: |
    running_kernel="$(uname -r)"
    latest_installed_kernel="$(dpkg -l 'linux-image-[0-9]*' | awk '/^ii/ {print $2}' | grep -v 'extra' | sort -V | tail -n1 | sed 's/linux-image-//')"
    if [ "$running_kernel" != "$latest_installed_kernel" ]; then
      echo "reboot_needed"
    else
      echo "ok"
    fi
  register: ubuntu_kernel_check
  changed_when: false
  when: ansible_facts['os_family'] == "Debian"

- name: "[Reboot] Debian/Ubuntu: отправка команды на перезагрузку (при необходимости)"
  ansible.builtin.shell: "sleep 2 && shutdown -r now"
  async: 1
  poll: 0
  when: ubuntu_kernel_check.stdout == "reboot_needed" and ansible_facts['os_family'] == "Debian"

- name: "[Reboot] Debian/Ubuntu: ожидание поднятия сервера после перезагрузки (пользователь {{ deploy_user }})"
  ansible.builtin.wait_for_connection:
    connect_timeout: 10
    timeout: 300
    delay: 10
  vars:
    ansible_user: "{{ deploy_user }}"
  when: ubuntu_kernel_check.stdout == "reboot_needed" and ansible_facts['os_family'] == "Debian"

- name: "[DKMS] Debian/Ubuntu: принудительная сборка DKMS и загрузка модуля amneziawg"
  shell: |
    dkms autoinstall -k $(uname -r) || true
    modprobe amneziawg
  register: modprobe_result
  changed_when: false
  when: ansible_facts['os_family'] == "Debian"
