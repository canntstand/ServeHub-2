- name: "[Pause] Пауза для ручной конфигурации WireGuard и данных на Local"
  ansible.builtin.pause:
    prompt: |
      ======================================================================
      ⚙️ НАСТРОЙКА WIREGUARD И ДАННЫХ НА LOCAL SERVER (РУЧНОЙ ШАГ):
      ======================================================================
      Выполните шаги для связывания локального сервера с удаленной VPS:

      1. 📁 ДАННЫЕ ПРИЛОЖЕНИЙ (ПРИ ПЕРЕЕЗДЕ):
          - Положите старую папку 'apps-data' в /home/{{ local_user }}/ServeHub-2/
          - Положите папку 'PersonalData' в /home/{{ local_user }}/
        
      Если была использована старая папка apps-data, то генерацию конфига WireGuard можно не делать.
      
      2. 🌐 ГЕНЕРАЦИЯ КОНФИГА WIREGUARD:
          - Откройте SSH-туннель до панели: ssh -L 8000:127.0.0.1:51821 {{ local_user }}@{{ vps_public_ip }}
          - Зайдите в веб-интерфейс: http://127.0.0.1:8000
          - Включите Prometheus в настройках wg-easy (если требуется).
          - Создайте клиента для локального сервера с фиксированным IP 10.8.0.2.
          - Сохраните конфиг на локальном сервере по пути:
            /home/{{ local_user }}/ServeHub-2/apps-data/amnezia/awg0.conf
        
      Для проверки или переноса данных вы можете подключиться по SSH:
      ssh {{ local_user }}@{{ local_private_ip }}
      ======================================================================
      Как только конфигурация awg0.conf на месте, нажмите ENTER для продолжения...

- name: "Проверка наличия конфигурационного файла"
  ansible.builtin.stat:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/amnezia/awg0.conf"
  register: wg_config

- name: "Ошибка: отсутствует файл конфигурации WireGuard"
  ansible.builtin.fail:
    msg: "WireGuard конфиг не найден! Пожалуйста, создайте его перед продолжением."
  when: not wg_config.stat.exists

# =========================================================================
# 1. СЕТЕВАЯ ПОДГОТОВКА И ОЧИСТКА ИНТЕРФЕЙСОВ
# =========================================================================
- name: "[Network] Проверка наличия старого интерфейса awg0"
  ansible.builtin.command: ip link show awg0
  register: awg0_check
  failed_when: false
  changed_when: false

- name: "[Network] Удаление старого интерфейса awg0, если он существует"
  ansible.builtin.command: ip link delete awg0
  when: awg0_check.rc == 0

# =========================================================================
# 2. СОЗДАНИЕ ДИРЕКТОРИЙ И НАСТРОЙКА ПРАВ (ПОЛНЫЙ АУДИТ ПО COMPOSE)
# =========================================================================
- name: "[FS] Гарантия существования корня apps-data"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: "[FS] Настройка системных папок приложений (владелец deploy_user)"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0777"
  loop:
    - vaultwarden/data
    - navidrome/data
    - audiobookshelf/config
    - audiobookshelf/metadata
    - portainer/data
    - postgres/nextcloud
    - postgres/vaultwarden

- name: "[FS] Точечная настройка прав для Nextcloud HTML (UID 33)"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/nextcloud/html"
    state: directory
    recurse: yes
    owner: "33"
    group: "33"
    mode: "u=rwX,g=rwX,o=rX"

- name: "[FS] Точечная настройка прав для Borg-UI (UID 1001)"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/borg-ui"
    state: directory
    recurse: yes
    owner: "1001"
    group: "1001"
    mode: "u=rwX,g=,o="

- name: "[FS] Точечная настройка прав для Prometheus (UID 65534)"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/prometheus/data"
    state: directory
    recurse: yes
    owner: "65534"
    group: "65534"
    mode: "u=rwX,g=rX,o=rX"

- name: "[FS] Точечная настройка прав для Grafana (UID 472)"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/grafana/data"
    state: directory
    recurse: yes
    owner: "472"
    group: "472"
    mode: "0755"

- name: "[FS] Точечная настройка прав для Grafana Loki (UID 10001)"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/loki"
    state: directory
    recurse: yes
    owner: "10001"
    group: "10001"
    mode: "0755"

- name: "[FS] Точечная настройка прав для Gitea (UID 1000)"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/gitea"
    state: directory
    recurse: yes
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: "[FS] Точечная настройка прав для Amnezia VPN (Владелец deploy_user)"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/amnezia"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0700"

- name: "[FS] Создание пользовательских папок для медиафайлов"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/PersonalData/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
  loop:
    - Music
    - Audiobooks
    - Podcasts
    - Books

- name: "[FS] Настройка папки NextcloudData внутри PersonalData"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/PersonalData/NextcloudData"
    state: directory
    recurse: yes
    owner: "33"
    group: "33"
    mode: "u=rwX,g=rX,o="

# =========================================================================
# 3. НАСТРОЙКА РЕЗЕРВНОГО КОПИРОВАНИЯ (BORGMATIC & BORG BACKUP)
# =========================================================================
- name: "[Backup] Проверка физического присутствия диска с указанным UUID"
  ansible.builtin.command: "blkid -U {{ backup_disk_uuid }}"
  register: disk_check
  changed_when: false
  become: true
  failed_when: false
  when: backup_disk_uuid is defined and (backup_disk_uuid | length > 0)

- name: "[Backup] Блок настройки бэкапов (выполняется, только если UUID корректен и диск найден)"
  block:
    - name: "[Backup] Монтирование резервного диска и запись в /etc/fstab"
      ansible.posix.mount:
        path: /mnt/backup_storage
        src: "UUID={{ backup_disk_uuid }}"
        fstype: auto
        opts: "defaults,nofail"
        state: mounted

    - name: "[Backup] Создание директории конфигурации /etc/borgmatic"
      ansible.builtin.file:
        path: /etc/borgmatic
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "[Backup] Генерация конфигурации config.yaml из шаблона Jinja2"
      ansible.builtin.template:
        src: templates/borgmatic_config.yaml.j2
        dest: /etc/borgmatic/config.yaml
        owner: root
        group: root
        mode: "0600"

    - name: "[Backup] Проверка, существует ли файл config в репозитории (индикатор инициализации)"
      ansible.builtin.stat:
        path: /mnt/backup_storage/server_backup.borg/config
      register: borg_repo_stat

    - name: "[Backup] Инициализация репозитория Borg (только если файла config нет)"
      ansible.builtin.command: borgmatic rcreate --encryption repokey-blake2 --make-parent
      when: not borg_repo_stat.stat.exists

    - name: "[Backup] Подготовка директории кэша Borg для Docker-контейнера"
      ansible.builtin.file:
        path: /root/.cache/borg
        state: directory
        owner: root
        group: root
        mode: "0777"
      become: true

    - name: "[Backup] Оптимизация прав безопасности на директорию бэкапов"
      ansible.builtin.file:
        path: /mnt/backup_storage
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: "[Backup] Создание директории для systemd override borgmatic.service"
      ansible.builtin.file:
        path: /etc/systemd/system/borgmatic.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "[Backup] Расширение CapabilityBoundingSet для работы с кэшем"
      ansible.builtin.copy:
        dest: /etc/systemd/system/borgmatic.service.d/override.conf
        content: |
          [Service]
          CapabilityBoundingSet=CAP_DAC_READ_SEARCH CAP_NET_RAW CAP_DAC_OVERRIDE
        owner: root
        group: root
        mode: "0644"
      register: systemd_override

    - name: "[Backup] Перезапуск демона systemd при изменении оверрайда"
      ansible.builtin.systemd:
        daemon_reload: yes
      when: systemd_override.changed

    - name: "[Backup] Включение и запуск системного таймера borgmatic.timer"
      ansible.builtin.systemd:
        name: borgmatic.timer
        enabled: yes
        state: started
  when:
    - backup_disk_uuid is defined
    - backup_disk_uuid | length > 0
    - disk_check.rc == 0

# =========================================================================
# 4. НАСТРОЙКА ALERTMANAGER
# =========================================================================
- name: "[Monitoring] Создание директории для данных Alertmanager"
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/ServeHub-2/apps-data/alertmanager"
    state: directory
    owner: "65534"
    group: "65534"
    mode: "0755"

- name: "[Monitoring] Рендеринг конфигурации alertmanager.yml из шаблона"
  ansible.builtin.template:
    src: templates/alertmanager.yml.j2
    dest: "/home/{{ deploy_user }}/ServeHub-2/configs/monitoring/alertmanager.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"

# =========================================================================
# 5. СИСТЕМНЫЕ НАСТРОЙКИ ЯДРА И СЕТЕВОЙ БРАНДМАУЭР (IPTABLES)
# =========================================================================
- name: "[Kernel] Загрузка модуля ядра AmneziaWG"
  ansible.builtin.modprobe:
    name: amneziawg
    state: present

- name: "[Kernel] Применение параметров sysctl для маршрутизации трафика"
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: yes
    reload: yes
  loop:
    - { name: "net.ipv4.ip_forward", value: "1" }
    - { name: "net.ipv4.conf.all.src_valid_mark", value: "1" }
    - { name: "net.ipv6.conf.all.disable_ipv6", value: "0" }
    - { name: "net.ipv6.conf.all.forwarding", value: "1" }
    - { name: "net.ipv6.conf.default.forwarding", value: "1" }

- name: "[Firewall] Установка утилит сохранения iptables (Debian/Ubuntu)"
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: ansible_facts['os_family'] == "Debian"

- name: "[Firewall] Активация и запуск сервиса iptables (Arch Linux)"
  ansible.builtin.systemd:
    name: iptables
    enabled: yes
    state: started
  when: ansible_facts['os_family'] == "Archlinux"

- name: "[Firewall] Настройка FORWARD для входящего трафика awg0"
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: awg0
    jump: ACCEPT
    state: present
  register: iptables_forward_in

- name: "[Firewall] Настройка FORWARD для исходящего трафика awg0"
  ansible.builtin.iptables:
    chain: FORWARD
    out_interface: awg0
    jump: ACCEPT
    state: present
  register: iptables_forward_out

- name: "[Firewall] Статус изменений FORWARD"
  ansible.builtin.set_fact:
    iptables_forward_rules:
      changed: "{{ iptables_forward_in.changed or iptables_forward_out.changed }}"

- name: "[Firewall] Настройка NAT MASQUERADE для подсети VPN"
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: 10.8.0.0/24
    out_interface: "{{ ansible_facts['default_ipv4']['interface'] }}"
    jump: MASQUERADE
  register: iptables_nat_rule

- name: "[Firewall] Сохранение правил iptables (Debian/Ubuntu)"
  ansible.builtin.command: netfilter-persistent save
  when: >
    ansible_facts['os_family'] == "Debian" and 
    (iptables_forward_rules.changed or iptables_nat_rule.changed)
  changed_when: false

- name: "[Firewall] Сохранение правил iptables (Arch Linux)"
  ansible.builtin.shell: iptables-save > /etc/iptables/iptables.rules
  when: >
    ansible_facts['os_family'] == "Archlinux" and 
    (iptables_forward_rules.changed or iptables_nat_rule.changed)
  changed_when: false

# =========================================================================
# 6. ЗАПУСК СЕРВИСОВ СТЕКА SERVEHUB-2
# =========================================================================
- name: "[Docker] Восстановление системных цепочек iptables для Docker"
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: "[Docker] Запуск основного стека контейнеров ServeHub-2"
  community.docker.docker_compose_v2:
    project_src: "/home/{{ deploy_user }}/ServeHub-2"
    files:
      - docker-compose.local.yaml
    state: present
  register: compose_start

- name: "[Docker] Получение итогового статуса запущенных сервисов"
  ansible.builtin.command:
    cmd: "docker compose -f docker-compose.local.yaml ps"
    chdir: "/home/{{ deploy_user }}/ServeHub-2"
  register: compose_ps_output
  changed_when: false

- name: "[Status] 📊 ТЕКУЩИЙ СТАТУС ЗАПУЩЕННЫХ СЕРВИСОВ 📊"
  ansible.builtin.debug:
    var: compose_ps_output.stdout_lines
