# =========================================================================
# 1. СЕТЕВАЯ ПОДГОТОВКА И ОЧИСТКА ИНТЕРФЕЙСОВ
# =========================================================================
- name: "[Network] Проверка наличия старого интерфейса awg0"
  ansible.builtin.command: ip link show awg0
  register: awg0_check
  failed_when: false
  changed_when: false

- name: "[Network] Удаление старого интерфейса awg0, если он существует"
  ansible.builtin.command: ip link delete awg0
  when: awg0_check.rc == 0

# =========================================================================
# 2. НАСТРОЙКА ПЛАГИНА WEBNAMES DNS ДЛЯ CERTBOT
# =========================================================================
- name: "[Pause] Пауза для переноса папки certbot с сертификатами."
  ansible.builtin.pause:
    prompt: |
      ======================================================================
      📄 ВОЗОБНОВЛЕНИЕ СЕРТИФИКАТОВ (РУЧНОЙ ШАГ):
      ======================================================================
      Если у вас остались старые сертификаты положите папку certbot в /home/{{ deploy_user }}/ServeHub-2 на удаленном сервере. (можно подключиться по ssh {{ deploy_user }}@{{ vps_public_ip }})
      ВАЖНО: При пропуске этого шага сертификаты подтянутся самостоятельно, однако это займет около 20 мин.
      ======================================================================
      Нажмите ENTER для продолжения деплоя...

- name: "[Certbot] Клонирование плагина certbot-dns-webnames"
  ansible.builtin.git:
    repo: "https://github.com/regtime-ltd/certbot-dns-webnames.git"
    dest: "/home/{{ deploy_user }}/ServeHub-2/certbot/certbot-dns-webnames"
    version: master
    update: no

- name: "[Certbot] Скачивание конфигурации Certbot через API Webnames"
  ansible.builtin.get_url:
    url: "https://www.webnames.ru/scripts/json_domain_zone_manager.pl?action=get_config_certbot&domain={{ server_name }}&apikey={{ webnames_apikey }}"
    dest: "/home/{{ deploy_user }}/ServeHub-2/certbot/certbot-dns-webnames/config.sh"
    mode: "0755"

- name: "[Certbot] Валидация: Проверка, что полученный файл конфигурации не пустой"
  ansible.builtin.stat:
    path: "/home/{{ deploy_user }}/ServeHub-2/certbot/certbot-dns-webnames/config.sh"
  register: webnames_config_stat
  failed_when: webnames_config_stat.stat.size == 0

- name: "[Certbot] Установка прав на исполнение для всех скриптов плагина"
  ansible.builtin.shell:
    cmd: "chmod +x *.sh"
    chdir: "/home/{{ deploy_user }}/ServeHub-2/certbot/certbot-dns-webnames"
  changed_when: true

# =========================================================================
# 3. ПРОВЕРКА И КЛИЕНТСКИЙ ЗАПУСК CERTBOT
# =========================================================================
- name: "[Certbot] Проверка наличия текущего SSL-сертификата проекта"
  ansible.builtin.stat:
    path: "/home/{{ deploy_user }}/ServeHub-2/certbot/certs/live/{{ server_name }}/fullchain.pem"
  register: current_cert_stat

- name: "[Certbot] Проверка срока действия сертификата (истекает ли в ближайшие 30 дней)"
  ansible.builtin.command:
    cmd: "openssl x509 -checkend 2592000 -noout -in /home/{{ deploy_user }}/ServeHub-2/certbot/certs/live/{{ server_name }}/fullchain.pem"
  register: cert_expiry_check
  when: current_cert_stat.stat.exists
  failed_when: false
  changed_when: false

- name: "[Certbot] Первичный запрос НОВОГО SSL-сертификата через Docker"
  ansible.builtin.command:
    cmd: "docker compose -f docker-compose.remote.yaml run --rm certbot"
    chdir: "/home/{{ deploy_user }}/ServeHub-2"
  when: not current_cert_stat.stat.exists

- name: "[Certbot] Принудительное ОБНОВЛЕНИЕ старого SSL-сертификата"
  ansible.builtin.command:
    cmd: "docker compose -f docker-compose.remote.yaml run --rm certbot renew --non-interactive"
    chdir: "/home/{{ deploy_user }}/ServeHub-2"
  when: current_cert_stat.stat.exists and (cert_expiry_check.rc is defined and cert_expiry_check.rc != 0)

# =========================================================================
# 4. НАСТРОЙКА АВТООБНОВЛЕНИЯ СЕРТИФИКАТОВ (SYSTEMD СЕРВИС & TIMER)
# =========================================================================
- name: "[Systemd] Создание сервиса certbot-renew.service"
  ansible.builtin.copy:
    dest: /etc/systemd/system/certbot-renew.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Автоматическое обновление сертификатов Certbot/Webnames в Docker
      After=docker.service

      [Service]
      Type=oneshot
      WorkingDirectory=/home/{{ deploy_user }}/ServeHub-2
      ExecStart=/bin/bash ./scripts/renew_certs.sh

      [Install]
      WantedBy=multi-user.target
  register: certbot_service_file

- name: "[Systemd] Создание таймера certbot-renew.timer"
  ansible.builtin.copy:
    dest: /etc/systemd/system/certbot-renew.timer
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Таймер для обновления сертификатов Certbot

      [Timer]
      OnCalendar=*-*-* 03,15:00:00
      RandomizedDelaySec=900
      Persistent=true

      [Install]
      WantedBy=timers.target
  register: certbot_timer_file

- name: "[Systemd] Перезапуск daemon-reload и активация таймера certbot-renew"
  ansible.builtin.systemd_service:
    name: certbot-renew.timer
    enabled: yes
    state: started
    daemon_reload: "{{ 'yes' if certbot_service_file.changed or certbot_timer_file.changed else 'no' }}"

# =========================================================================
# 5. СИСТЕМНЫЕ НАСТРОЙКИ ЯДРА И СЕТЕВОЙ БРАНДМАУЭР (IPTABLES)
# =========================================================================
- name: "[Kernel] Загрузка модуля ядра AmneziaWG"
  ansible.builtin.modprobe:
    name: amneziawg
    state: present

- name: "[Kernel] Применение параметров sysctl для маршрутизации трафика"
  ansible.builtin.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: yes
    reload: yes
  loop:
    - { name: "net.ipv4.ip_forward", value: "1" }
    - { name: "net.ipv4.conf.all.src_valid_mark", value: "1" }
    - { name: "net.ipv6.conf.all.disable_ipv6", value: "0" }
    - { name: "net.ipv6.conf.all.forwarding", value: "1" }
    - { name: "net.ipv6.conf.default.forwarding", value: "1" }

- name: "[Firewall] Установка утилит сохранения iptables (Debian/Ubuntu)"
  ansible.builtin.apt:
    name: iptables-persistent
    state: present
    update_cache: yes
  environment:
    DEBIAN_FRONTEND: noninteractive
  when: ansible_facts['os_family'] == "Debian"

- name: "[Firewall] Активация и запуск сервиса iptables (Arch Linux)"
  ansible.builtin.systemd:
    name: iptables
    enabled: yes
    state: started
  when: ansible_facts['os_family'] == "Archlinux"

- name: "[Firewall] Настройка FORWARD для входящего трафика wg0"
  ansible.builtin.iptables:
    chain: FORWARD
    in_interface: wg0
    jump: ACCEPT
    state: present
  register: iptables_forward_in

- name: "[Firewall] Настройка FORWARD для исходящего трафика wg0"
  ansible.builtin.iptables:
    chain: FORWARD
    out_interface: wg0
    jump: ACCEPT
    state: present
  register: iptables_forward_out

- name: "[Firewall] Статус изменений FORWARD"
  ansible.builtin.set_fact:
    iptables_forward_rules:
      changed: "{{ iptables_forward_in.changed or iptables_forward_out.changed }}"

- name: "[Firewall] Настройка NAT MASQUERADE для подсети VPN"
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: 10.8.0.0/24
    out_interface: "{{ ansible_facts['default_ipv4']['interface'] }}"
    jump: MASQUERADE
  register: iptables_nat_rule

- name: "[Firewall] Сохранение правил iptables (Debian/Ubuntu)"
  ansible.builtin.command: netfilter-persistent save
  when: >
    ansible_facts['os_family'] == "Debian" and 
    (iptables_forward_rules.changed or iptables_nat_rule.changed)
  changed_when: false

- name: "[Firewall] Сохранение правил iptables (Arch Linux)"
  ansible.builtin.shell: iptables-save > /etc/iptables/iptables.rules
  when: >
    ansible_facts['os_family'] == "Archlinux" and 
    (iptables_forward_rules.changed or iptables_nat_rule.changed)
  changed_when: false

# =========================================================================
# 6. ЗАПУСК УДАЛЕННОГО СТЕКА КОНТЕЙНЕРОВ И ВАЛИДАЦИЯ
# =========================================================================
- name: "[Docker] Восстановление системных цепочек iptables для Docker"
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: "[Docker Compose] Запуск целевых сервисов удаленной инфраструктуры"
  community.docker.docker_compose_v2:
    project_src: "/home/{{ deploy_user }}/ServeHub-2"
    files: [docker-compose.remote.yaml]
    state: present
    services:
      - gatus
      - nginx
      - wg-easy
      - nginx_exporter

- name: "[Docker Compose] Получение финального статуса контейнеров"
  ansible.builtin.command:
    cmd: "docker compose -f docker-compose.remote.yaml ps"
    chdir: "/home/{{ deploy_user }}/ServeHub-2"
  register: docker_ps_status
  changed_when: false

- name: "[Status] 📊 ТЕКУЩИЙ СТАТУС ЗАПУЩЕННЫХ СЕРВИСОВ 📊"
  ansible.builtin.debug:
    var: docker_ps_status.stdout_lines
