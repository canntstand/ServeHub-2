global:
  scrape_interval: 30s

rule_files:
  - "/etc/prometheus/alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets: ["host.docker.internal:9100"]
  
  - job_name: "node-exporter-vps"
    static_configs:
      - targets: ["10.8.0.1:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
  
  - job_name: "cadvisor-vps"
    static_configs:
      - targets: ["10.8.0.1:8090"]

  - job_name: "nginx-exporter"
    static_configs:
      - targets: ["nginx_exporter:9113"]

  - job_name: "nginx-exporter-vps"
    static_configs:
      - targets: ["10.8.0.1:9113"]
  
  - job_name: 'adguardhome-exporter'
    static_configs:
      - targets: ['10.8.0.1:9618']

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "wg-easy"
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["10.8.0.1:51821"]

  - job_name: "alertmanager"
    metrics_path: /metrics
    static_configs:
      - targets: ["alertmanager:9093"]
  
  - job_name: "borg-ui"
    metrics_path: /metrics
    static_configs:
      - targets: ["borg-ui:8081"]
